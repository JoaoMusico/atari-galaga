<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Defender - Atari Style Combat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        #game-container {
            position: relative;
            border: 8px solid #1a1a1a;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.1);
            background: #000;
        }

        /* CRT Scanline Effect */
        #game-container::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        canvas {
            display: block;
            background: #000;
            image-rendering: pixelated;
        }

        #ui-overlay {
            position: absolute;
            top: 25px;
            left: 25px;
            right: 25px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            font-size: 14px;
            z-index: 5;
            color: #0ff;
            text-shadow: 2px 2px #f0f;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10;
            backdrop-filter: blur(4px);
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #0ff;
            text-shadow: 4px 4px #ff00ff;
            animation: glitch 1s linear infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); text-shadow: -2px -2px #f0f; }
            40% { transform: translate(-2px, -2px); text-shadow: 2px 2px #0ff; }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        p {
            font-size: 14px;
            line-height: 2.5;
            text-align: center;
            color: #aaa;
        }

        .btn {
            margin-top: 40px;
            padding: 20px 40px;
            background: transparent;
            color: #0ff;
            border: 4px solid #0ff;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            font-size: 18px;
            transition: all 0.2s;
            box-shadow: 0 0 10px #0ff;
        }

        .btn:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 30px #0ff;
            transform: scale(1.05);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-overlay">
            <div id="score">SCORE: 0000</div>
            <div id="wave-ui">WAVE: 1</div>
            <div id="lives">LIVES: 3</div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="start-screen" class="screen">
            <h1>STAR<br>DEFENDER</h1>
            <p>SETAS: MOVER<br>ESPAÇO: ATIRAR</p>
            <button class="btn" onclick="startGame()">PRESS START</button>
        </div>

        <div id="game-over-screen" class="screen hidden">
            <h1>MISSION FAILED</h1>
            <p id="final-score">SCORE: 0000</p>
            <p id="final-wave">WAVES CLEARED: 0</p>
            <button class="btn" onclick="resetGame()">REPLAY</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const scoreElement = document.getElementById('score');
        const waveElement = document.getElementById('wave-ui');
        const livesElement = document.getElementById('lives');
        const finalScoreElement = document.getElementById('final-score');
        const finalWaveElement = document.getElementById('final-wave');

        const WIDTH = 600;
        const HEIGHT = 700;
        canvas.width = WIDTH;
        canvas.height = HEIGHT;

        const COLORS = {
            player: '#00ffff',
            playerGlow: 'rgba(0, 255, 255, 0.5)',
            enemy1: '#ff00ff',
            enemy2: '#ffff00',
            enemy3: '#00ff00',
            bullet: '#ffffff',
            particle: '#ff4400'
        };

        let gameActive = false;
        let score = 0;
        let lives = 3;
        let wave = 1;
        let keys = {};
        let frames = 0;

        const player = {
            width: 44,
            height: 34,
            x: WIDTH / 2 - 22,
            y: HEIGHT - 80,
            speed: 6,
            bullets: []
        };

        let enemies = [];
        let enemyBullets = [];
        let enemyDirection = 1;
        let enemySpeed = 1.0;
        let particles = [];

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function createEnemies() {
            enemies = [];
            // Wave Progression: starts small, builds up
            const rows = Math.min(2 + Math.floor(wave / 2), 6);
            const cols = Math.min(3 + wave, 9);
            
            const totalWidth = cols * 55;
            const startX = (WIDTH - totalWidth) / 2 + 10;
            
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    enemies.push({
                        x: startX + c * 55,
                        y: 80 + r * 50,
                        width: 32,
                        height: 24,
                        type: r % 3,
                        animOffset: Math.random() * Math.PI * 2
                    });
                }
            }
        }

        function spawnParticles(x, y, color) {
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 40,
                    maxLife: 40,
                    color: color
                });
            }
        }

        function drawShip(x, y, w, h, color) {
            ctx.shadowBlur = 15;
            ctx.shadowColor = color;
            ctx.fillStyle = color;
            
            ctx.beginPath();
            ctx.moveTo(x + w / 2, y);
            ctx.lineTo(x + w, y + h);
            ctx.lineTo(x + w * 0.8, y + h * 0.7);
            ctx.lineTo(x + w * 0.2, y + h * 0.7);
            ctx.lineTo(x, y + h);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#fff';
            ctx.fillRect(x + w / 2 - 3, y + 12, 6, 8);
            ctx.shadowBlur = 0;
        }

        function drawEnemy(enemy) {
            const types = [COLORS.enemy1, COLORS.enemy2, COLORS.enemy3];
            const color = types[enemy.type] || COLORS.enemy1;
            
            const bounce = Math.sin(frames * 0.1 + enemy.animOffset) * 2;
            const ex = enemy.x;
            const ey = enemy.y + bounce;
            
            ctx.shadowBlur = 10;
            ctx.shadowColor = color;
            ctx.fillStyle = color;
            
            ctx.fillRect(ex + 8, ey, 16, 4);
            ctx.fillRect(ex + 4, ey + 4, 24, 4); 
            ctx.fillRect(ex, ey + 8, 32, 8); 
            ctx.fillRect(ex + 4, ey + 16, 8, 4);
            ctx.fillRect(ex + 20, ey + 16, 8, 4);
            ctx.fillRect(ex, ey + 20, 4, 4);
            ctx.fillRect(ex + 28, ey + 20, 4, 4);

            ctx.fillStyle = '#000';
            ctx.fillRect(ex + 8, ey + 8, 4, 4);
            ctx.fillRect(ex + 20, ey + 8, 4, 4);
            ctx.shadowBlur = 0;
        }

        function update() {
            if (!gameActive) return;
            frames++;

            if (keys['ArrowLeft'] && player.x > 10) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < WIDTH - player.width - 10) player.x += player.speed;

            if (keys['Space'] && frames % 18 === 0) {
                player.bullets.push({ x: player.x + player.width / 2 - 2, y: player.y, w: 4, h: 20 });
            }

            player.bullets.forEach((b, i) => {
                b.y -= 8;
                if (b.y < -20) player.bullets.splice(i, 1);
            });

            let hitEdge = false;
            enemies.forEach(e => {
                e.x += enemyDirection * enemySpeed;
                if (e.x + e.width > WIDTH - 10 || e.x < 10) hitEdge = true;
            });

            if (hitEdge) {
                enemyDirection *= -1;
                enemies.forEach(e => {
                    e.y += 25;
                    if (e.y + e.height >= player.y) gameOver();
                });
                enemySpeed += 0.05;
            }

            // Shooting frequency increases slightly with wave
            const shootChance = Math.max(80 - wave * 2, 40);
            if (frames % shootChance === 0 && enemies.length > 0) {
                const shooter = enemies[Math.floor(Math.random() * enemies.length)];
                enemyBullets.push({ x: shooter.x + shooter.width / 2, y: shooter.y + shooter.height, w: 4, h: 12 });
            }

            enemyBullets.forEach((b, i) => {
                b.y += 5;
                if (b.y > HEIGHT) enemyBullets.splice(i, 1);
                if (b.x < player.x + player.width && b.x + b.w > player.x && b.y < player.y + player.height && b.y + b.h > player.y) {
                    enemyBullets.splice(i, 1);
                    loseLife();
                }
            });

            player.bullets.forEach((pb, pbi) => {
                enemies.forEach((e, ei) => {
                    if (pb.x < e.x + e.width && pb.x + pb.w > e.x && pb.y < e.y + e.height && pb.y + pb.h > e.y) {
                        const colors = [COLORS.enemy1, COLORS.enemy2, COLORS.enemy3];
                        spawnParticles(e.x + e.width / 2, e.y + e.height / 2, colors[e.type]);
                        enemies.splice(ei, 1);
                        player.bullets.splice(pbi, 1);
                        score += 50 + (4 - e.type) * 10;
                        updateUI();
                        
                        // Next Wave Logic
                        if (enemies.length === 0) {
                            wave++;
                            enemySpeed = 1.0 + (wave * 0.1); // Reset speed but slightly faster ground floor
                            setTimeout(() => {
                                createEnemies();
                                updateUI();
                            }, 500);
                        }
                    }
                });
            });

            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            });
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            ctx.fillStyle = '#555';
            for (let i = 0; i < 40; i++) {
                const sX = (Math.sin(i * 123.4) * 0.5 + 0.5) * WIDTH;
                const sY = ((Math.cos(i * 567.8) * 0.5 + 0.5) * HEIGHT + frames * (i % 3 + 1)) % HEIGHT;
                ctx.fillRect(sX, sY, 2, 2);
            }

            drawShip(player.x, player.y, player.width, player.height, COLORS.player);
            enemies.forEach(drawEnemy);

            ctx.fillStyle = COLORS.bullet;
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#fff';
            player.bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            ctx.fillStyle = '#f00';
            ctx.shadowColor = '#f00';
            enemyBullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            particles.forEach(p => {
                ctx.globalAlpha = p.life / p.maxLife;
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.fillRect(p.x, p.y, 3, 3);
            });
            ctx.globalAlpha = 1.0;
            ctx.shadowBlur = 0;
        }

        function updateUI() {
            scoreElement.innerText = `SCORE: ${score.toString().padStart(4, '0')}`;
            waveElement.innerText = `WAVE: ${wave}`;
            livesElement.innerText = `LIVES: ${lives}`;
        }

        function loseLife() {
            lives--;
            updateUI();
            spawnParticles(player.x + player.width / 2, player.y + player.height / 2, COLORS.player);
            if (lives <= 0) gameOver();
            else player.x = WIDTH / 2 - 22;
        }

        function startGame() {
            gameActive = true;
            score = 0; lives = 3; wave = 1; enemySpeed = 1.0;
            player.x = WIDTH / 2 - 22;
            createEnemies();
            updateUI();
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            gameLoop();
        }

        function gameOver() {
            gameActive = false;
            finalScoreElement.innerText = `SCORE: ${score.toString().padStart(4, '0')}`;
            finalWaveElement.innerText = `WAVES CLEARED: ${wave - 1}`;
            gameOverScreen.classList.remove('hidden');
        }

        function resetGame() {
            startGame();
        }

        function gameLoop() {
            if (!gameActive) return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function idleLoop() {
            if (!gameActive) {
                frames++;
                draw();
                requestAnimationFrame(idleLoop);
            }
        }
        idleLoop();
    </script>
</body>
</html>
